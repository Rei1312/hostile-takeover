  const vw = window.innerWidth, vh = window.innerHeight;
  const s = Math.min(vw / W, vh / H);

  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  crt.style.width = w + 'px'; crt.style.height = h + 'px';

      if (col){ g.fillStyle = col; g.fillRect(x*sc, y*sc, sc, sc); }
    }
  return c;
}

let towerScroll = 0, farScroll = 0, nearScroll = 0, nebScroll = 0, fgScroll = 0, planetX = 350;

function scrollBG(dt, k){
  k = k || 1;
  nebScroll  = (nebScroll  + 5*dt*k) % W;
  farScroll  = (farScroll  + 9*dt*k) % FARW;
  towerScroll = (towerScroll + 22*dt*k) % MIDW;
  nearScroll = (nearScroll + 40*dt*k) % NEARW;
  fgScroll   += 62*dt*k;
  planetX    -= 2.2*dt*k; if (planetX < -150) planetX = W + 10;
  blimpX     -= 3.5*dt*k; if (blimpX < -100) blimpX = W + 30;
  for (const s of stars){ s.x -= s.z*dt*k; if (s.x < -2){ s.x = W+2; s.y = Math.random()*GROUND; } }
  if (level === 3){
    if (Math.random() < dt*.22)                            // bioluminescent jellyfish
      fw3.push({x: 60+Math.random()*(W-120), y: GROUND-26, t: 0,
                col: [MAG, CYAN, AMB, GRN][(Math.random()*4)|0]});
    for (const f of fw3) f.t += dt;
    for (let i = fw3.length-1; i >= 0; i--) if (fw3[i].t > 6) fw3.splice(i, 1);
    if (Math.random() < dt*.16) fish3.push({x: W+18, y: 40+Math.random()*(GROUND-130), t: 0});
    for (const f of fish3){ f.t += dt; f.x -= 32*dt; }
    for (let i = fish3.length-1; i >= 0; i--) if (fish3[i].x < -26) fish3.splice(i, 1);
    if (Math.random() < dt*.5)                             // extra bubbles
      shoots.push({x: 30+Math.random()*(W-60), y: GROUND-8, vx: -14, vy: -30-Math.random()*20, t: 3.2});
  }
  if (Math.random() < dt*.3){
    if (level === 3) shoots.push({x: 30+Math.random()*(W-60), y: GROUND-10, vx: -14, vy: -30-Math.random()*20, t: 3.2});  // bubbles
    else if (level === 2) shoots.push({x: Math.random()*W, y: -4, vx: -40, vy: 200, t: .9});
    else shoots.push({x: 60+Math.random()*W*.8, y: 10+Math.random()*70, vx: -220, vy: 70, t: .55});
  }
  for (const sh of shoots){ sh.x += sh.vx*dt; sh.y += sh.vy*dt; sh.t -= dt; }
  for (let i = shoots.length-1; i >= 0; i--) if (shoots[i].t <= 0) shoots.splice(i, 1);
  if (Math.random() < dt*.22){
    const ltr = Math.random() < .5;
    traffic.push({x: ltr ? -14 : W+14, y: 16 + Math.random()*100,
                  vx: (ltr ? 1 : -1) * (12 + Math.random()*20), t: 0});
  }
  for (const tr of traffic){ tr.x += tr.vx*dt; tr.t += dt; }
  for (let i = traffic.length-1; i >= 0; i--)
    if (traffic[i].x < -20 || traffic[i].x > W+20) traffic.splice(i, 1);
}

    banner('HARPOON VOLLEY!', .9);

    for (let k = -1; k <= 1; k++)
      ebullets.push({x: b.x-44, y: b.y, vx: Math.cos(ah+k*.18)*130*DIFF, vy: Math.sin(ah+k*.18)*130*DIFF, coin: false, r: 4, t: 0});
    sfx.beamFire();
  } else if (kind === 'bubbles'){                        // WHALE: wavy bubble curtain
    for (let i = 0; i < 7; i++)
      ebullets.push({x: b.x-46, y: b.y + (i-3)*7, vx: -75*DIFF, vy: 0, bit: true, wavePh: i*.9, r: 3, t: 0});
    sfx.whoosh();
  } else if (kind === 'lootrain'){                       // WHALE: bait the gambler
    banner('LOOT DROP!', .9);
    spawnLoot(); spawnLoot(); if (b.phase >= 2) spawnLoot();
  } else if (kind === 'breach'){                         // WHALE: dives, then erupts under you
    banner('BREACH!', 1.1);
    b.breach = {t: -.9, x: player.x};
    sfx.beamCharge();
  }
  const pace = (1.45 - heat*.45) * (b.phase >= 3 ? .8 : 1);   // dynamic difficulty + desperation
  const slow = {sweep: 4.4, lunge: 2.8, vortex: 2.4, legal: 3.2, trace: 2.2,
                harpoon: 2.2, bubbles: 2, lootrain: 2.6, breach: 3.6};
  if (b.type === 'algo') b.atk = (slow[kind] || (b.phase >= 2 ? 1.6 : 2.3)) * pace;
  else b.atk = (slow[kind] || (b.phase >= 2 ? 1.4 : 2)) * pace;
}
function pickBossAttack(b){
  const r = Math.random();
  if (b.type === 'whale'){
    if (b.phase >= 2){
      if (r < (b.phase >= 3 ? .32 : .24)) return 'breach';
      if (r < .55) return 'harpoon';
      if (r < .78) return 'bubbles';
      return 'lootrain';
    }
    if (r < .38) return 'harpoon';
    if (r < .72) return 'bubbles';
    return 'lootrain';
  }
  if (b.type === 'algo'){
    if (b.phase >= 3){
      if (r < .28) return 'trace';
      if (r < .5)  return 'grid';
      if (r < .7)  return 'wall';
      if (r < .88) return 'sweep';
      return 'swarm';
    }
    if (b.phase === 2){
      if (r < .24) return 'trace';
      if (r < .46) return 'grid';
      if (r < .68) return 'wall';
      if (r < .86) return 'sweep';
      return 'swarm';
    }
    if (b.hp < b.maxhp*.75 && r < .22) return 'sweep';
    if (r < .5) return 'grid';
    if (r < .8) return 'wall';
    return 'swarm';
  }
  const low = b.hp < b.maxhp*.7;
  if (b.phase >= 3){
    if (r < .26) return 'lunge';
    if (r < .48) return 'vortex';
    if (r < .64) return 'spiral';
    if (r < .78) return 'beam';
    if (r < .9)  return 'fan';
    return 'legal';
  }
  if (b.phase === 2){
    if (r < .22) return 'vortex';
    if (r < .42) return 'spiral';
    if (r < .62) return 'beam';
    if (r < .82) return 'fan';
    return 'rain';
  }
  if (low && r < .3) return 'beam';
  if (low && r < .55) return 'rain';
  return 'fan';
}

// ---------- powers (3 incremental levels each, Gradius-style) ----------
const SHIELD_CAP = [0, 2, 4, 6];
function powLvl(idx){
  const p = player, n = POWERS[idx];
  return n === 'OPTION' ? p.lv.OPTION : p.lv[n];
}
function powerMaxed(idx){
  const p = player, n = POWERS[idx];
  if (n === 'DOUBLE') return p.lv.DOUBLE >= 3 && p.weapon === 'dbl';
  if (n === 'LASER')  return p.lv.LASER >= 3 && p.weapon === 'laser';
  if (n === 'SHIELD') return p.lv.SHIELD >= 3 && p.shield >= SHIELD_CAP[3];
  return p.lv[n] >= 3;
}
// Power-up announcer: natural, energetic arcade-host delivery.
// Prefers characterful natural voices (Daniel/Alex/Samantha) over robotic ones.
let gVoice = null;
function pickVoice(){
  try {
    const vs = speechSynthesis.getVoices();
    gVoice = vs.find(v => /daniel/i.test(v.name) && /^en/i.test(v.lang)) ||
             vs.find(v => /alex/i.test(v.name) && /^en/i.test(v.lang)) ||
             vs.find(v => /samantha/i.test(v.name)) ||
             vs.find(v => /^en[-_]/i.test(v.lang)) ||
             vs.find(v => /^en/i.test(v.lang)) || null;
  } catch(err){}
}
if ('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function announce(text){
  try {
    if (muted || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text + '!');   // exclamation lifts the prosody
    if (gVoice) u.voice = gVoice;
    u.rate = 1.12; u.pitch = 1.15; u.volume = .7;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  } catch(err){}
}
function activatePower(){
  const p = player, i = p.meter;
  if (i <= 0) return;
  if (powerMaxed(i-1)){ sfx.hit(); return; }
  const name = POWERS[i-1];
  if (name === 'SPEED')        p.lv.SPEED++;
  else if (name === 'MISSILE') p.lv.MISSILE++;
  else if (name === 'DOUBLE'){
    if (p.weapon !== 'dbl'){ p.weapon = 'dbl'; if (!p.lv.DOUBLE) p.lv.DOUBLE = 1; }
    else p.lv.DOUBLE++;
  } else if (name === 'LASER'){
    if (p.weapon !== 'laser'){ p.weapon = 'laser'; if (!p.lv.LASER) p.lv.LASER = 1; }
    else p.lv.LASER++;
  } else if (name === 'OPTION'){ p.lv.OPTION++; p.options.push({x: p.x, y: p.y}); }
  else if (name === 'SHIELD'){ if (p.lv.SHIELD < 3) p.lv.SHIELD++; p.shield = SHIELD_CAP[p.lv.SHIELD]; }
  p.meter = 0;
  if (name === 'SHIELD') sfx.shieldUp(); else sfx.power();
  banner(name + ' LV' + powLvl(i-1) + '!', 1.2);
  announce(name === 'SPEED' ? 'speed up' : name === 'SHIELD' ? 'force field' : name.toLowerCase());
}

// ---------- combat ----------
function fireFrom(x, y){
  const p = player;
  if (p.weapon === 'laser' && p.lv.LASER > 0){
    const L = p.lv.LASER;                                  // longer, hotter beam per level
    shots.push({x, y, vx: 400 + L*30, vy: 0, w: 18 + L*8, h: 3, dmg: 1 + L, pierce: true, laser: true});
  } else {
    shots.push({x, y, vx: 300, vy: 0, w: 9, h: 3, dmg: 1});
    if (p.weapon === 'dbl' && p.lv.DOUBLE > 0){
      shots.push({x, y, vx: 212, vy: -212, w: 7, h: 2, dmg: 1});                    // LV1: up
      if (p.lv.DOUBLE >= 2) shots.push({x: x-24, y, vx: -260, vy: 0, w: 8, h: 3, dmg: 1});  // LV2: tail
      if (p.lv.DOUBLE >= 3) shots.push({x, y, vx: 212, vy: 212, w: 7, h: 2, dmg: 1});       // LV3: down
    }
  }
}
function playerDie(){
  const p = player;
  heat = Math.max(.55, heat - .3);                      // ease off after a death
  p.alive = false; p.respawn = 1.6; p.shield = 0;
  lives--; shake = .4;
  burst(p.x, p.y, CYAN, 22); burst(p.x, p.y, WHT, 10); ring(p.x, p.y, 30);
  sfx.bigBoom();
  if (lives < 0){ state = 'over'; endT = 0; jingle([64,62,60,57], .28, .3, 'triangle'); }
}
function hitPlayer(){
  const p = player;
  if (!p.alive || p.invuln > 0) return;
  if (p.shield > 0){
    if (p.shieldCd > 0) return;                    // force field is already soaking this beam tick
    p.shield--; p.shieldCd = .3;
    sfx.shieldHit(); burst(p.x+10, p.y, CYAN, 6);
    if (p.shield === 0) pop(p.x, p.y - 16, 'SHIELD DOWN');
    return;
  }
  playerDie();
}
function killEnemy(e){
  heat = Math.min(1.6, heat + .008);                    // doing well -> the market fights back
  addScore(e.score);
  if (!e.drop && heat < .85 && Math.random() < .12)     // struggling -> mercy capsule
    caps.push({x: e.x, y: e.y, t: 0});
  pop(e.x, e.y - 12, e.kind === 'popup' ? 'AD CLOSED +50' : '+' + e.score);
  if (e.kind === 'popup'){
    burst(e.x, e.y, '#C9D4E4', 8); ring(e.x, e.y, 12); sfx.rack();
    if (e.drop) caps.push({x: e.x, y: e.y, t: 0});
    return;
  }
  if (e.kind === 'loot'){                               // gacha: capsule or a face full of coins
    burst(e.x, e.y, AMB, 12); ring(e.x, e.y, 14); sfx.cap();
    if (Math.random() < .35){ caps.push({x: e.x, y: e.y, t: 0}); pop(e.x, e.y-14, 'JACKPOT!'); }
    else {
      pop(e.x, e.y-14, 'GACHA!');
      for (let k = 0; k < 6; k++){
        const a5 = k*1.047 + Math.random()*.3;
        ebullets.push({x: e.x, y: e.y, vx: Math.cos(a5)*70*DIFF, vy: Math.sin(a5)*70*DIFF, coin: true, r: 3, t: 0});
      }
      sfx.coin();
    }
    return;
  }
  if (e.kind === 'slot'){                               // the machine finally pays out
    burst(e.x, e.y, AMB, 16); burst(e.x, e.y, '#B03030', 8); ring(e.x, e.y, 18); sfx.cap();
    if (Math.random() < .6){ caps.push({x: e.x, y: e.y, t: 0}); pop(e.x, e.y-16, 'PAID OUT'); }
    return;
  }
  if (e.kind === 'rack'){
    burst(e.x, e.y, GRN, 8); burst(e.x, e.y, '#39435C', 6); ring(e.x, e.y, 12);
    sfx.rack();
  } else if (e.kind === 'midboss'){
    burst(e.x, e.y, AMB, 24); burst(e.x, e.y, WHT, 14); ring(e.x, e.y, 30); ring(e.x, e.y-10, 22);
    sfx.bigBoom(); shake = .5;
    banner(e.name === 'cfo' ? 'CFO: ASSETS FROZEN. BONUS INTACT.' :
           e.name === 'sys' ? 'SYSADMIN: CLOSED AS WONTFIX' :
           'MIDDLE MANAGER: PROMOTED TO CUSTOMER', 2.2);
    caps.push({x: e.x, y: e.y - 14, t: 0});
  } else {
    burst(e.x, e.y, e.kind==='vp' ? AMB : e.kind==='influencer' ? MAG : e.kind==='lawyer' ? MAG : HULL, 14);
    ring(e.x, e.y, 16);
    sfx.boom();
  }
  if (e.drop) caps.push({x: e.x, y: e.y, t: 0});
}

// ---------- update ----------
function update(dt){
  levelT += dt;
  scrollBG(dt, 1);
  for (const t of TIMELINE) if (levelT >= t[0] && !spawned.includes(t)){ spawned.push(t); t[1](); }
  // ambient pressure: constant light spawns between set pieces
  if (levelT > 20 && levelT < (level === 2 ? 193 : 240) && !boss){
    heat += (1 - heat) * dt * .02;                      // drift back to neutral
    ambT -= dt;
    if (ambT <= 0 && enemies.length < 14){              // cap on-screen chaos
      ambT = (3.2 + Math.random()*3) / heat;
      const r = Math.random();
      if (r < .32) spawnDrone(30 + Math.random()*(GROUND-80), 0, Math.random() < .18);
      else if (r < .46) spawnInfluencer(40 + Math.random()*140, false);
      else if (r < .6){ if (level === 3) spawnLoot(); else spawnRack(40 + Math.random()*(GROUND-100), Math.random() < .3); }
      else if (r < .72) spawnCrawler(level === 2 && Math.random() < .5);
      else if (r < .86) spawnPopup();
      else if (level === 1) spawnChute(260 + Math.random()*180);
      else if (level === 3){ const r3 = Math.random(); r3 < .4 ? spawnWhalet(60 + Math.random()*(GROUND-140), false) : r3 < .7 ? spawnDealer(50 + Math.random()*(GROUND-110), false) : spawnSlot(50 + Math.random()*(GROUND-110), false); }
      else spawnSwarm(50 + Math.random()*(GROUND-120));
      if (Math.random() < .3) spawnDrone(30 + Math.random()*(GROUND-80), 0, false);  // extra pressure
    }
  }
  if (winT > 0){
    winT -= dt;
    if (winT <= 0 && state === 'play'){
      state = 'win'; endT = 0; jingle([72,76,79,84,88], .13, .12);
      cleared[level] = 1;
      try { localStorage.setItem('ht-cleared', JSON.stringify(cleared)); } catch(e){}
    }
  }

  const p = player;
  if (!p.alive && state === 'play'){
    p.respawn -= dt;
    if (p.respawn <= 0){ p.alive = true; p.x = 50; p.y = H/2; p.invuln = 2.5; p.py = undefined; keys.vx = keys.vy = 0; }
  }
  if (p.invuln > 0) p.invuln -= dt;
  if (p.shieldCd > 0) p.shieldCd -= dt;
  if (p.alive && p.shield > 0){                    // the force field deprecates over time
    p.shieldT += dt;
    if (p.shieldT > 6){
      p.shieldT = 0; p.shield--;
      burst(p.x+10, p.y, '#5C6C8C', 4);
      if (p.shield === 0) pop(p.x, p.y - 16, 'SHIELD DEPRECATED');
    }
  }

  if (p.alive){
    const spd = 110 + p.lv.SPEED*35;
    p.x += keys.vx * spd * dt; p.y += keys.vy * spd * dt;
    p.x = Math.max(10, Math.min(W-40, p.x));
    p.y = Math.max(14, Math.min(GROUND-12, p.y));
    const vyNow = (p.y - (p.py === undefined ? p.y : p.py)) / Math.max(dt, .0001);
    p.py = p.y;
    p.bank += (Math.max(-1, Math.min(1, vyNow/160)) - p.bank) * Math.min(1, dt*10);
    if (Math.random() < .85)
      parts.push({x: p.x-12, y: p.y+(Math.random()-.5)*2, vx: -50-Math.random()*30,
                  vy: (Math.random()-.5)*8, t: .15+Math.random()*.12,
                  col: Math.random() < .5 ? '#FF9838' : AMB});
    p.trail.unshift({x: p.x, y: p.y});
    if (p.trail.length > 40) p.trail.pop();
    for (let i = 0; i < p.options.length; i++){
      const pos = p.trail[Math.min(p.trail.length-1, (i+1)*13)];
      p.options[i].x = pos.x; p.options[i].y = pos.y;
    }
    p.fireT -= dt;
    const lasing = p.weapon === 'laser' && p.lv.LASER > 0;
    if (p.fireT <= 0){
      p.fireT = lasing ? (p.lv.LASER >= 3 ? .17 : .2) : .16;
      fireFrom(p.x + 14, p.y);
      for (const o of p.options) fireFrom(o.x + 12, o.y);
      lasing ? sfx.laser() : sfx.shoot();
    }
    if (p.lv.MISSILE > 0){
      p.mslT -= dt;
      if (p.mslT <= 0){
        p.mslT = p.lv.MISSILE >= 2 ? .38 : .55;            // LV2: faster reload
        missiles.push({x: p.x, y: p.y+4, vy: 130, crawl: false});
        if (p.lv.MISSILE >= 3) missiles.push({x: p.x, y: p.y-4, vy: -130, crawl: false});  // LV3: ceiling missile
        sfx.msl();
      }
    }
  }

  for (const s of shots){ s.x += s.vx*dt; s.y += s.vy*dt; }
  shots = shots.filter(s => s.x < W+30 && s.x > -30 && s.y > -10 && s.y < H+10);
  for (const m of missiles){
    if (!m.crawl){
      m.x += 60*dt; m.y += m.vy*dt;
      if (m.vy > 0 && m.y >= GROUND-9){ m.y = GROUND-9; m.crawl = true; }
      if (m.vy < 0 && m.y <= 24){ m.y = 24; m.crawl = true; }        // crawls the ceiling
    }
    else m.x += 170*dt;
  }
  missiles = missiles.filter(m => m.x < W+10);

  for (const e of enemies) e.up(e, dt);
  for (const e of enemies){
    if (e.kind === 'fan') continue;                 // fans only push, never collide
    if (e.kind === 'gate'){                         // firewall beam: only the gap is safe
      const inBeam = y => (y >= 18 && y <= e.y - e.gap) || (y >= e.y + e.gap && y <= GROUND - 8);
      for (const s of shots){                       // beams absorb all player fire
        if (s.dead) continue;
        const sx = s.x + s.w*.5;
        if (Math.abs(sx - e.x) < 5 && inBeam(s.y)){ s.dead = true; burst(e.x, s.y, '#FF3860', 3); }
      }
      for (const m of missiles){                    // (floor crawlers pass underneath)
        if (m.dead) continue;
        if (Math.abs(m.x - e.x) < 5 && inBeam(m.y)){ m.dead = true; burst(e.x, m.y, '#FF3860', 3); }
      }
      for (const o of enemies){                     // beams fry light enemies flying through
        if (o === e || o.kind === 'gate' || o.kind === 'midboss' ||
            o.kind === 'turret' || o.kind === 'turretC' || o.hp <= 0) continue;
        if (Math.abs(o.x - e.x) < 4 && inBeam(o.y)) o.hp = 0;
      }
      if (p.alive && Math.abs(e.x - p.x) < 5 && Math.abs(e.y - p.y) > e.gap - 6) hitPlayer();
      continue;
    }
    const hy = (e.ry || e.r);                       // per-axis hitbox (tall vs wide sprites)
    if (e.flash > 0) e.flash -= dt;
    for (const s of shots){
      if (s.dead || (s.hit && s.hit.has(e))) continue;
      const sx = s.x + s.w*.5;                      // collide on bullet center, not left edge
      if (Math.abs(sx - e.x) < e.r+6 && Math.abs(s.y - e.y) < hy+4){
        e.hp -= s.dmg; e.flash = .07;
        if (s.pierce && e.kind !== 'midboss') (s.hit || (s.hit = new Set())).add(e);  // pierce small fry
        else s.dead = true;                          // mid-bosses are solid too
        burst(s.x, s.y, WHT, 2);
      }
    }
    for (const m of missiles){
      if (m.dead) continue;
      if (Math.abs(m.x - e.x) < e.r+5 && Math.abs(m.y - e.y) < hy+5){ e.hp -= 2; e.flash = .07; m.dead = true; sfx.mslHit(); }
    }
    if (p.alive && !e.noContact && Math.abs(e.x-p.x) < e.r+5 && Math.abs(e.y-p.y) < hy+4){
      if (p.shield > 0 && p.invuln <= 0){ e.hp -= 3; e.flash = .07; }   // force field rams
      hitPlayer();
    }
  }
  shots = shots.filter(s => !s.dead);
  missiles = missiles.filter(m => !m.dead);
  for (const e of enemies) if (e.hp <= 0 && !e.gone) killEnemy(e);
  enemies = enemies.filter(e => e.hp > 0 && e.x > -40 && !e.gone);

  // ---- final boss ----
  if (boss){
    const b = boss;
    b.t += dt; if (b.flash > 0) b.flash -= dt;
    if (b.dying > 0){
      // staged death sequence
      const prev = b.dying; b.dying += dt;
      b.x += (Math.random()-.5)*3;
      shake = Math.max(shake, .25);
      if ((b.dying*5|0) !== (prev*5|0)){
        burst(b.x-34+Math.random()*68, b.y-34+Math.random()*68, [AMB,MAG,WHT][(b.dying*5|0)%3], 14);
        ring(b.x-24+Math.random()*48, b.y-24+Math.random()*48, 26);
        sfx.boom();
        for (let i = 0; i < 3; i++)   // money spraying out
          parts.push({x: b.x, y: b.y, vx: -40-Math.random()*120, vy: -60+Math.random()*120,
                      t: .9, col: AMB});
      }
      if (b.dying > 2.4){
        sfx.bigBoom(); sfx.bigBoom();
        burst(b.x, b.y, WHT, 40); ring(b.x, b.y, 60); ring(b.x, b.y, 40);
        shake = 1;
        boss = null; winT = 1.4;
      }
    } else if (!b.entered){
      // entrance dive from top-right
      b.x += ((W-70) - b.x) * Math.min(1, dt*1.4);
      b.y += ((H/2-10) - b.y) * Math.min(1, dt*1.4);
      if (Math.abs(b.x-(W-70)) < 3 && Math.abs(b.y-(H/2-10)) < 3){ b.entered = true; shake = .5; sfx.bigBoom(); }
    } else {
      const spd = b.phase >= 2 ? 1.35 : 1;
      if (b.type === 'algo'){
        // glitch-teleport between server slots instead of hovering
        if (b.tp){ b.tp.t -= dt; if (b.tp.t <= 0) b.tp = null; }
        b.tpT = (b.tpT === undefined ? 2.4 : b.tpT) - dt;
        if (b.tpT <= 0 && !b.tp){
          burst(b.x, b.y, GRN, 12); ring(b.x, b.y, 24);
          const spots = [[W-70, 74], [W-70, H/2-10], [W-70, GROUND-78], [W-128, H/2-10]];
          const sp2 = spots[(Math.random()*spots.length)|0];
          b.x = sp2[0]; b.y = sp2[1];
          burst(b.x, b.y, GRN, 12); sfx.whoosh();
          b.tp = {t: .25};
          b.tpT = b.phase >= 3 ? 1.2 : b.phase === 2 ? 1.7 : 2.6;
        }
      } else if (b.breach){                              // whale: dive under, erupt at your column
        const B2 = b.breach; B2.t += dt;
        if (B2.t < 0) shake = Math.max(shake, .06);
        else {
          const k = Math.min(1, B2.t / 1.4);
          if (k < .3) b.y += ((GROUND+130) - b.y) * Math.min(1, dt*5);
          else if (k < .4) b.x = B2.x;
          else if (k < .75) b.y += (52 - b.y) * Math.min(1, dt*6);
          else {
            b.x += ((W-78) - b.x) * Math.min(1, dt*3);
            b.y += ((H/2-10) - b.y) * Math.min(1, dt*3);
          }
          if (k >= 1) b.breach = null;
        }
      } else if (b.type === 'whale'){
        b.y = H/2 - 10 + Math.sin(b.t*.6) * 66;          // slow deep swells
        if (b.phase >= 2 && p.alive)                     // whale song: the current pulls you in
          p.x = Math.min(W-40, p.x + 22*dt);
      } else if (b.lunge){                               // buyout lunge: dash across and back
        const L = b.lunge; L.t += dt;
        if (L.t < 0) shake = Math.max(shake, .08);       // wind-up rumble
        else {
          const k = Math.min(1, L.t / 1.1);
          b.x = k < .5 ? (W-70) - (W-140)*(k/.5) : 70 + (W-140)*((k-.5)/.5);
          b.y += (L.ty - b.y) * Math.min(1, dt*6);
          if (k >= 1){ b.lunge = null; b.x = W-70; }
        }
      } else
      b.y = H/2 - 10 + Math.sin(b.t*.9*spd) * 52;
      // phase 2 trigger: MARGIN CALL
      if (b.phase === 1 && b.hp <= b.maxhp*.6){
        b.phase = 2; b.flash = .2; b.tele = 0; b.beam = null;
        banner(b.type === 'whale' ? '⚠ WHALE SONG — THE CURRENT PULLS! ⚠' : b.type === 'algo' ? '⚠ OVERCLOCK ENGAGED! ⚠' : '⚠ MARGIN CALL! ⚠', 2.4);
        sfx.warn(); shake = .6;
        burst(b.x, b.y, b.type === 'algo' ? RED : '#FF2D6C', 26); ring(b.x, b.y, 40);
      } else if (b.phase === 2 && b.hp <= b.maxhp*.25){
        b.phase = 3; b.flash = .25; b.tele = 0;
        banner(b.type === 'whale' ? '⚠ DEEP DIVE! ⚠' : b.type === 'algo' ? '⚠ DDoS OVERDRIVE! ⚠' : '⚠ HOSTILE BUYOUT! ⚠', 2.4);
        sfx.warn(); shake = .8;
        burst(b.x, b.y, RED, 34); ring(b.x, b.y, 50); ring(b.x, b.y, 34);
      }
      // laser beam
      if (b.beam){
        b.beam.t += dt;
        if (b.beam.t >= 0 && b.beam.t < .05 && b.beam.t - dt < 0) sfx.beamFire();
        if (b.beam.t >= 0 && b.beam.t < .4){
          shake = Math.max(shake, .12);
          if (p.alive && p.x < b.x - 20 && Math.abs(p.y - b.beam.y) < 6) hitPlayer();
        }
        if (b.beam.t >= .4) b.beam = null;
      }
      // vertical trace beam (Algorithm)
      if (b.vbeam){
        const v = b.vbeam; v.t += dt;
        if (v.t >= 0 && v.t < .05 && v.t - dt < 0) sfx.beamFire();
        if (v.t >= 0 && v.t < .35){
          shake = Math.max(shake, .1);
          if (p.alive && Math.abs(p.x - v.x) < 7) hitPlayer();
        }
        if (v.t >= .35) b.vbeam = null;
      }
      // phase-3 desperation drizzle
      if (b.phase >= 3){
        b.driz = (b.driz === undefined ? .5 : b.driz) - dt;
        if (b.driz <= 0){
          b.driz = b.type === 'algo' ? .45 : .6;
          if (b.type === 'whale' && Math.random() < .3){ spawnLoot(); }
          else if (b.type === 'algo')
            ebullets.push({x: 40+Math.random()*(W-140), y: -6, vx: 0, vy: (120+Math.random()*40)*DIFF, bit: true, r: 3, t: 0});
          else {
            const a3 = Math.random()*6.28;
            ebullets.push({x: b.x-30, y: b.y, vx: Math.cos(a3)*70*DIFF, vy: Math.sin(a3)*70*DIFF, coin: true, r: 3, t: 0});
          }
        }
      }
      // spiral barrage
      if (b.spiralN > 0){
        b.spiralT -= dt;
        if (b.spiralT <= 0){
          b.spiralT = .07; b.spiralA += .55;
          ebullets.push({x: b.x-10, y: b.y, vx: Math.cos(b.spiralA)*85*DIFF, vy: Math.sin(b.spiralA)*85*DIFF, coin:true, r:3, t:0});
          if (b.spiralN % 3 === 0) sfx.coin();
          b.spiralN--;
        }
      }
      // telegraph -> attack
      if (b.tele > 0){
        b.tele -= dt;
        const mtx = b.x - 22, mty = b.y - 8;    // mouth
        const a = Math.random()*Math.PI*2, rr = 26 + Math.random()*10;
        parts.push({x: mtx + Math.cos(a)*rr, y: mty + Math.sin(a)*rr,
                    vx: -Math.cos(a)*rr*3.4, vy: -Math.sin(a)*rr*3.4, t: .22, col: b.phase >= 2 ? '#FF2D6C' : AMB});
        if (b.tele <= 0) bossAttack(b, b.next);
      } else {
        b.atk -= dt;
        if (b.atk <= 0 && !b.beam && b.spiralN <= 0){
          b.next = pickBossAttack(b);
          b.tele = .42;
        }
      }
      // battle damage smoke
      if (b.hp < b.maxhp*.35 && Math.random() < dt*10)
        parts.push({x: b.x-24+Math.random()*48, y: b.y-24+Math.random()*30, vx: -15,
                    vy: -30-Math.random()*20, t: .6, col: '#4A5570'});
      // phase 2 money aura
      if (b.phase >= 2 && Math.random() < dt*8)
        parts.push({x: b.x-40+Math.random()*80, y: b.y+40, vx: 0, vy: -30-Math.random()*30, t: .8, col: AMB});
      // damage
      for (const s of shots){
        if (s.dead) continue;
        const sx = s.x + s.w*.5;
        if (Math.abs(sx-b.x) < b.hw-4 && Math.abs(s.y-b.y) < b.hh-4){
          b.hp -= s.dmg; b.flash = .06;
          s.dead = true;                             // bosses are solid: even lasers stop here
          burst(s.x, s.y, MAG, 2);
        }
      }
      for (const m of missiles){
        if (m.dead) continue;
        if (Math.abs(m.x-b.x) < b.hw-4 && Math.abs(m.y-b.y) < b.hh){ b.hp -= 2; b.flash = .06; m.dead = true; sfx.mslHit(); }
      }
      shots = shots.filter(s => !s.dead);
      missiles = missiles.filter(m => !m.dead);
      if (p.alive && Math.abs(b.x-p.x) < b.hw-2 && Math.abs(b.y-p.y) < b.hh-2) hitPlayer();
      if (b.hp <= 0){
        b.hp = 0; b.dying = .0001; b.beam = null; b.vbeam = null; b.lunge = null; b.breach = null; b.spiralN = 0;
        ebullets = [];
        addScore(5000); pop(b.x, b.y - 46, '+5000');
        sfx.bigBoom();
      }
    }
  }

  const spawned2 = [];
  for (const b of ebullets){
    b.t += dt;
    if (b.fuse !== undefined && b.fuse > 0){        // telegraphed charge
      b.fuse -= dt;
      if (b.fuse <= 0){
        if (b.tx !== undefined){                    // vortex: converge on the marked point
          const a4 = Math.atan2(b.ty - b.y, b.tx - b.x);
          b.vx = Math.cos(a4)*115*DIFF; b.vy = Math.sin(a4)*115*DIFF;
          sfx.coin();
        } else {                                    // grid-lock: burst 4-way
          for (const [vx, vy] of [[95,0],[-95,0],[0,95],[0,-95]])
            spawned2.push({x: b.x, y: b.y, vx: vx*DIFF, vy: vy*DIFF, bit: true, r: 3, t: 0});
          b.dead = true;
          sfx.rack();
        }
      }
      continue;
    }
    if (b.wavePh !== undefined) b.y += Math.sin(b.t*5 + b.wavePh) * 32 * dt;
    b.x += b.vx*dt; b.y += b.vy*dt;
  }
  ebullets.push(...spawned2);
  ebullets = ebullets.filter(b => b.x > -8 && b.x < W+8 && b.y > -8 && b.y < H+8);
  if (p.alive) for (const b of ebullets){
    if (b.fuse !== undefined && b.fuse > 0) continue;    // telegraphs are harmless
    if (Math.abs(b.x-p.x) < 6 && Math.abs(b.y-p.y) < 5){ b.dead = true; hitPlayer(); }
  }
  ebullets = ebullets.filter(b => !b.dead);

  for (const c of caps){ c.t += dt; c.x -= 34*dt; c.y += Math.sin(c.t*4)*10*dt; }
  caps = caps.filter(c => {
    if (p.alive && Math.abs(c.x-p.x) < 12 && Math.abs(c.y-p.y) < 10){
      let m = p.meter;                                 // advance, skipping maxed-out cells
      for (let k = 0; k < 6; k++){ m = m % 6 + 1; if (!powerMaxed(m-1)) break; }
      if (powerMaxed(m-1)){ p.meter = 0; addScore(500); pop(c.x, c.y - 10, 'ALL MAXED +500'); }
      else { p.meter = m; pop(c.x, c.y - 10, 'POWER'); }
      sfx.cap();
      return false;
    }
    return c.x > -10;
  });

  for (const q of parts){ if (q.g) q.vy += 150*dt; q.x += q.vx*dt; q.y += q.vy*dt; q.t -= dt; }
  parts = parts.filter(q => q.t > 0);
  for (const r of rings) r.t += dt;
  rings = rings.filter(r => r.t < r.max);
  for (const q of pops){ q.y -= 16*dt; q.t -= dt; }
  pops = pops.filter(q => q.t > 0);
  for (const b of banners) b.t -= dt;
  banners = banners.filter(b => b.t > 0);
  if (shake > 0) shake -= dt;
}

function chooseLevel(i){

function drawIntro(){

    ctx.fillText(brief[2], W/2, 138);

    ctx.fillText(brief[4], W/2, 184);

    const a = Math.min(1, introT/.5) * Math.min(1, (2.2 - introT)/.4);

    ctx.fillText('A LONG TIME AGO, IN A BOARDROOM', W/2, 120);
    ctx.fillText('FAR, FAR AWAY....', W/2, 138);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  } else {
    const crawlY = (introT - 2.2) * 20;
    const bottom = H - 14, top = 30, N = bottom - top;
    for (let i = 0; i < N; i++){
      const t = i / N;                                 // 0 = bottom, 1 = top (far away)
      const srcY = crawlY - i * (1 + t*.9);            // gentler perspective compression
      if (srcY < 0 || srcY >= crawlH - 1) continue;
      const dw = 360 * (1.15 - t*.5);                  // shallower taper = more legible
      ctx.globalAlpha = t > .78 ? Math.max(0, (1 - t) / .22) : 1;
      // sub-pixel sample from the 2x buffer (no |0) = no scroll flicker
      ctx.drawImage(crawlCv, 0, srcY*2, 720, 2, (W - dw)/2, bottom - i, dw, 1);
    }

    ctx.fillStyle = '#4E5C78'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'right';
    ctx.fillText('TAP TO SKIP ▸', W - 8, H - 8);

function flashDraw(e, img, x, y){

      for (let k = 0; k < 3; k++){

      if (((perfT*6)|0) % 2 === 0){

      }
      if (b.phase === 2){
        ctx.globalAlpha = .1 + .06*Math.sin(b.t*9);
        ctx.fillStyle = RED;
        ctx.beginPath(); ctx.arc(b.x, b.y+bob2, 58, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
  if (p.alive){
    for (const o of p.options){
      const a = perfT*5 + o.x*.1;
      ctx.fillStyle = AMB; ctx.beginPath(); ctx.arc(o.x|0, o.y|0, 4, 0, 7); ctx.fill();
      ctx.fillStyle = WHT; ctx.fillRect((o.x-1)|0, (o.y-1)|0, 2, 2);
      ctx.fillStyle = '#B07A18';
      ctx.fillRect((o.x + Math.cos(a)*5)|0, (o.y + Math.sin(a)*5)|0, 1, 1);
    }
    const blink = p.invuln > 0 && Math.floor(p.invuln*10) % 2 === 0;
    ctx.save();
    ctx.translate(p.x|0, p.y|0); ctx.rotate(p.bank * .22);
    const f = (perfT*24|0) % 3, len = 6 + f*2;
    ctx.fillStyle = AMB; ctx.fillRect(-10-len, -1, len, 3);
    ctx.fillStyle = WHT; ctx.fillRect(-10-Math.ceil(len/2), 0, Math.ceil(len/2), 1);
    ctx.drawImage(blink ? shipSpr2 : shipSpr, -11, -4);
    const lz = p.weapon === 'laser' && p.lv.LASER > 0;
    if (p.fireT > (lz ? .17 : .16) - .05){             // muzzle flash
      ctx.fillStyle = lz ? MAG : AMB; ctx.fillRect(13, -2, 4, 4);
      ctx.fillStyle = WHT; ctx.fillRect(14, -1, 2, 2);
    }
    ctx.restore();
    if (p.shield > 0){
      ctx.strokeStyle = 'rgba(93,242,230,' + (.15 + p.shield*.08) + ')';
      ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(p.x+3, p.y, 14, 0, 7); ctx.stroke();
      ctx.strokeStyle = 'rgba(93,242,230,' + (.4 + p.shield*.15) + ')';
      ctx.beginPath(); ctx.arc(p.x+3, p.y, 14, perfT*3, perfT*3 + 1.1); ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x+3, p.y, 14, perfT*3 + Math.PI, perfT*3 + Math.PI + 1.1); ctx.stroke();
    }
  }
  for (const s of shots){
    if (s.vy !== 0){
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(-Math.PI/4);
      ctx.fillStyle = CYAN; ctx.fillRect(0, -1, s.w, 2);
      ctx.fillStyle = WHT; ctx.fillRect(1, 0, s.w-2, 1);
      ctx.restore();
    } else if (s.laser){
      ctx.fillStyle = MAG; ctx.fillRect(s.x|0, (s.y-1)|0, s.w, 3);
      ctx.fillStyle = WHT; ctx.fillRect((s.x+2)|0, s.y|0, s.w-4, 1);
    } else {
      ctx.fillStyle = CYAN; ctx.fillRect(s.x|0, (s.y-1)|0, s.w, 3);
      ctx.fillStyle = WHT; ctx.fillRect((s.x+2)|0, s.y|0, s.w-3, 1);
    }
  }
  for (const m of missiles){
    ctx.fillStyle = HULL; ctx.fillRect((m.x-3)|0, (m.y-1)|0, 6, 3);
    ctx.fillStyle = AMB;  ctx.fillRect((m.x+3)|0, (m.y-1)|0, 2, 3);
    drawFlame(m.x - 3, m.y);
  }
  for (const b of ebullets){
    if (b.fuse !== undefined && b.fuse > 0){         // grid-lock telegraph: pulsing cross
      const pl = .4 + .6*Math.abs(Math.sin(b.t*10));
      ctx.globalAlpha = pl;
      ctx.fillStyle = b.fuse < .3 ? RED : (b.coin ? AMB : GRN);
      ctx.fillRect((b.x-4)|0, b.y|0, 9, 1); ctx.fillRect(b.x|0, (b.y-4)|0, 1, 9);
      ctx.globalAlpha = 1;
      continue;
    }
    // additive glow under every projectile
    ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = .16;
    ctx.fillStyle = b.bit ? GRN : b.coin ? AMB : WHT;
    ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill();
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    if (b.bit){                                      // data bit
      const on = ((b.t*10)|0) % 2 === 0;
      ctx.fillStyle = on ? GRN : '#2A8A50';
      ctx.fillRect((b.x-2)|0, (b.y-2)|0, 5, 5);
      ctx.fillStyle = WHT; ctx.fillRect(b.x|0, b.y|0, 1, 1);
    } else if (b.coin){
      const sq = Math.abs(Math.sin(b.t*6));
      ctx.fillStyle = AMB;
      ctx.beginPath(); ctx.ellipse(b.x, b.y, 1 + 2.2*sq, 3.2, 0, 0, 7); ctx.fill();
      if (sq > .6){ ctx.fillStyle = '#7A4A10'; ctx.fillRect((b.x-1)|0, (b.y-1)|0, 2, 2); }
    } else {
      ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.t*5);
      ctx.fillStyle = WHT; ctx.fillRect(-3, -2, 6, 4);
      ctx.fillStyle = '#8FA0BF'; ctx.fillRect(-2, -1, 4, 1);
      ctx.restore();
    }
  }
  for (const r of rings){
    const k = r.t / r.max, rad = r.R * Math.pow(k, .6);
    ctx.globalAlpha = (1 - k) * .3;
    ctx.fillStyle = WHT; ctx.beginPath(); ctx.arc(r.x, r.y, rad*.8, 0, 7); ctx.fill();
    ctx.globalAlpha = 1 - k;
    ctx.strokeStyle = WHT; ctx.lineWidth = 2 - k;
    ctx.beginPath(); ctx.arc(r.x, r.y, rad, 0, 7); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  for (const q of parts){ ctx.fillStyle = q.col; ctx.fillRect(q.x|0, q.y|0, 2, 2); }
  ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
  for (const q of pops){
    ctx.globalAlpha = Math.min(1, q.t*2.5);
    ctx.fillStyle = AMB;
    ctx.fillText(q.txt, q.x|0, q.y|0);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
  drawHUD();
  ctx.restore();

  if (paused && state === 'play'){
    ctx.fillStyle = 'rgba(5,7,15,.7)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = CYAN; ctx.font = 'bold 22px "Courier New", monospace';
    ctx.fillText('PAUSED', W/2, 118);
    ctx.fillStyle = '#8FA0BF'; ctx.font = 'bold 9px monospace';
    ctx.fillText('MARKET HOLIDAY — TRADING SUSPENDED', W/2, 138);
    ctx.fillStyle = '#5C6C8C';
    ctx.fillText('THIS PAUSE IS FREE. FOR NOW.', W/2, 150);
    if (Math.floor(perfT*2) % 2 === 0){
      ctx.fillStyle = HULL; ctx.font = 'bold 10px monospace';
      ctx.fillText('TAP ANYWHERE TO RESUME', W/2, 162);
    }
    ctx.textAlign = 'left';
  }

  if (state === 'over' || state === 'win'){
    endT += 1/60;
    ctx.fillStyle = 'rgba(5,7,15,.75)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    if (state === 'over'){
      ctx.fillStyle = RED; ctx.font = 'bold 22px "Courier New", monospace';
      ctx.fillText('YOU\'VE BEEN FIRED', W/2, 106);
      ctx.fillStyle = '#8FA0BF'; ctx.font = 'bold 9px monospace';
      ctx.fillText('SHIRANAI HITO, THE BOARD ACCEPTS YOUR RESIGNATION.', W/2, 126);
      ctx.fillStyle = '#5C6C8C';
      ctx.fillText('EXIT SURVEY: 47 QUESTIONS. ALL MANDATORY.', W/2, 140);
    } else {
      ctx.fillStyle = CYAN; ctx.font = 'bold 20px "Courier New", monospace';
      ctx.fillText('HOSTILE TAKEOVER COMPLETE', W/2, 100);
      ctx.fillStyle = AMB; ctx.font = 'bold 10px monospace';
      ctx.fillText(level === 3 ? 'THE WHALE HARVESTER HAS BEEN BEACHED'
                 : level === 2 ? 'THE ALGORITHM HAS BEEN DEPRECATED' : 'THE SHAREHOLDER HAS BEEN LIQUIDATED', W/2, 120);
      ctx.fillStyle = '#8FA0BF'; ctx.font = 'bold 9px monospace';
      ctx.fillText(level === 3 ? 'GACHA ODDS: FINALLY PUBLISHED · NICE FLYING, SHIRANAI HITO'
                 : level === 2 ? 'SERVERS NOW RUN ACTUAL GAMES · NICE FLYING, SHIRANAI HITO'
                               : 'ALL MICROTRANSACTIONS REFUNDED · NICE FLYING, SHIRANAI HITO', W/2, 134);
    }
    ctx.fillStyle = HULL; ctx.font = 'bold 11px monospace';
    ctx.fillText('SCORE ' + score + '   ·   HI ' + hiscore, W/2, 160);
    if (endT > 1 && Math.floor(endT*2) % 2 === 0){
      ctx.fillStyle = CYAN; ctx.font = 'bold 10px monospace';
      ctx.fillText('TAP FOR SECTOR SELECT', W/2, 186);
    }
    ctx.fillStyle = '#4E5C78'; ctx.font = 'bold 8px monospace';
    ctx.fillText('A REY@NIU PRODUCTION · JULY 2026', W/2, 212);
    ctx.textAlign = 'left';
  }
}

// ---------- input ----------
function togglePause(){
  if (state !== 'play') return;
  paused = !paused;
  sfx.pause();
}
const keys = {vx: 0, vy: 0, set: {}};
addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys.set[e.key] = true; syncKeys();
  if (e.key === ' ' || e.key === 'Enter'){
    if (state === 'title') startGame();
    else if (state === 'select') chooseLevel(selIdx);
    else if (state === 'intro') beginPlay();
    else if (state === 'play' && paused) togglePause();
    else if (state === 'play' && e.key === ' ') activatePower();
    else if ((state === 'over' || state === 'win') && endT > 1) state = 'select';
  }
  if (state === 'select'){
    if (e.key === 'ArrowUp')   selIdx = (selIdx + 4) % 5;
    if (e.key === 'ArrowDown') selIdx = (selIdx + 1) % 5;
  }
  if (e.key === 'm' || e.key === 'M') muted = !muted;
  if (e.key === 'p' || e.key === 'P') togglePause();
});
addEventListener('keyup', e => { keys.set[e.key] = false; syncKeys(); });
function syncKeys(){
  const s = keys.set;
  keys.vx = (s.ArrowRight||s.d?1:0) - (s.ArrowLeft||s.a?1:0);
  keys.vy = (s.ArrowDown||s.s?1:0) - (s.ArrowUp||s.w?1:0);
}

let moveTouch = null;
function toGame(cx, cy){
  const r = cv.getBoundingClientRect();
  return {x: (cx - r.left) / r.width * W, y: (cy - r.top) / r.height * H};
}
function cornerTap(g){
  if (g.y < 18 && g.x > W - 26){ muted = !muted; return true; }         // mute chip
  if (g.y < 18 && g.x > W - 52 && g.x <= W - 26){ togglePause(); return true; }  // pause chip
  return false;
}
stage.addEventListener('touchstart', e => {
  e.preventDefault(); audioInit();
  for (const t of e.changedTouches){
    const g = toGame(t.clientX, t.clientY);
    if (state === 'intro'){ beginPlay(); continue; }                    // skip crawl
    if (state === 'select'){
      const i = Math.floor((g.y - 60) / 33);
      if (i >= 0 && i < 5 && g.x > 32 && g.x < 448) chooseLevel(i);
      continue;
    }
    if (cornerTap(g)) continue;
    if (paused && state === 'play'){ togglePause(); continue; }         // tap anywhere resumes
    if (state === 'over' || state === 'win'){ if (endT > 1) state = 'select'; continue; }
    if (state !== 'play') continue;
    if (g.y > GROUND){ activatePower(); continue; }
    if (moveTouch === null){ moveTouch = {id: t.identifier, x: g.x, y: g.y}; }
    else activatePower();
  }
}, {passive: false});
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  if (moveTouch === null || !player.alive || paused) return;
  for (const t of e.changedTouches){
    if (t.identifier !== moveTouch.id) continue;
    const g = toGame(t.clientX, t.clientY);
    player.x += (g.x - moveTouch.x) * 1.25;
    player.y += (g.y - moveTouch.y) * 1.25;
    player.x = Math.max(10, Math.min(W-40, player.x));
    player.y = Math.max(14, Math.min(GROUND-12, player.y));
    moveTouch.x = g.x; moveTouch.y = g.y;
  }
}, {passive: false});
function endTouch(e){
  for (const t of e.changedTouches)
    if (moveTouch && t.identifier === moveTouch.id) moveTouch = null;
}
stage.addEventListener('touchend', endTouch);
stage.addEventListener('touchcancel', endTouch);

let mouseDown = false, mx2 = 0, my2 = 0;
stage.addEventListener('mousedown', e => {
  audioInit();
  const g = toGame(e.clientX, e.clientY);
  if (state === 'intro'){ beginPlay(); return; }
  if (state === 'select'){
    const i = Math.floor((g.y - 60) / 33);
    if (i >= 0 && i < 5 && g.x > 32 && g.x < 448) chooseLevel(i);
    return;
  }
  if (cornerTap(g)) return;
  if (paused && state === 'play'){ togglePause(); return; }
  if (state === 'over' || state === 'win'){ if (endT > 1) state = 'select'; return; }
  if (state !== 'play') return;
  if (g.y > GROUND){ activatePower(); return; }
  mouseDown = true; mx2 = g.x; my2 = g.y;
});
stage.addEventListener('mousemove', e => {
  if (!mouseDown || state !== 'play' || !player.alive || paused) return;
  const g = toGame(e.clientX, e.clientY);
  player.x = Math.max(10, Math.min(W-40, player.x + (g.x-mx2)*1.25));
  player.y = Math.max(14, Math.min(GROUND-12, player.y + (g.y-my2)*1.25));
  mx2 = g.x; my2 = g.y;
});
addEventListener('mouseup', () => mouseDown = false);

function startGame(){
  audioInit();
  titleEl.style.display = 'none';
  state = 'select';
}
function beginPlay(){
  reset(); state = 'play';
}
document.getElementById('startBtn').addEventListener('click', startGame);
titleEl.addEventListener('touchend', e => { e.preventDefault(); startGame(); }, {passive: false});

// debug: synchronous fast-forward (testing hook)
window.__ff = secs => {
  for (let i = 0; i < secs*60; i++) if (state === 'play' && !paused){
    if (window.__god){ player.invuln = 9; lives = 3; }
    update(1/60);
  }
  render();
  window.__dbg = {state, paused, levelT: +levelT.toFixed(1), nBanners: banners.length,
                  nEnemies: enemies.length, kinds: enemies.map(e=>e.kind).join(','),
                  score, boss: !!boss, bossPhase: boss ? boss.phase : 0, bossHp: boss ? boss.hp : 0, lives};
  return window.__dbg;
};

window.__boss = fn => { if (boss && fn) fn(boss); return boss ? {hp: boss.hp, phase: boss.phase, type: boss.type} : null; };
window.__intro = s => { if (state === 'intro'){ introT = s; render(); } return state; };
window.__skip = () => { if (state === 'intro') beginPlay(); return state; };
window.__go = lv => { level = lv; titleEl.style.display = 'none'; beginPlay(); return window.__ff(0); };
// collision self-tests (debug)
window.__test = () => {
  const res = {};
  reset(); state = 'play'; lives = 4;
  keys.set = {}; keys.vx = 0; keys.vy = 0;              // neutralize any stuck keys
  levelT = 1; ambT = 999;                               // isolate from timeline & ambient spawns
  spawned.length = 0; for (const tl of TIMELINE) spawned.push(tl);
  enemies = []; boss = null;
  // A: normal shot kills a drone
  enemies = []; shots = []; ebullets = []; player.invuln = 9; player.x = 30; player.y = 200;
  spawnDrone(100, 0); enemies[0].x = 200; enemies[0].y0 = 100; enemies[0].y = 100; enemies[0].up = ()=>{};
  const sc0 = score;
  shots.push({x: 170, y: 100, vx: 300, vy: 0, w: 9, h: 3, dmg: 2});
  for (let i = 0; i < 20; i++) update(1/60);
  res.shotKillsDrone = score > sc0 && enemies.length === 0;
  // B: enemy coin hits the player
  enemies = []; ebullets = []; player.alive = true; player.invuln = 0; player.shield = 0;
  player.x = 100; player.y = 100; const l0 = lives;
  ebullets.push({x: 140, y: 100, vx: -150, vy: 0, coin: true, r: 3, t: 0});
  for (let i = 0; i < 30; i++) update(1/60);
  res.coinHitsPlayer = lives === l0 - 1;
  // C: laser pierces through two drones (kills both)
  enemies = []; shots = []; player.alive = false; player.respawn = 99;
  spawnDrone(80, 0); spawnDrone(80, 0);
  enemies[0].x = 240; enemies[0].y = 80; enemies[0].up = ()=>{};
  enemies[1].x = 290; enemies[1].y = 80; enemies[1].up = ()=>{};
  shots.push({x: 190, y: 80, vx: 420, vy: 0, w: 26, h: 3, dmg: 2, pierce: true, laser: true});
  for (let i = 0; i < 25; i++) update(1/60);
  res.laserPiercesBoth = enemies.length === 0;
  // D: pierce damages each enemy only ONCE (3hp VP survives one 2dmg laser pass at 1hp)
  enemies = []; shots = [];
  spawnVP(90); const v = enemies[0]; v.x = 240; v.y = 90; v.up = ()=>{};
  shots.push({x: 190, y: 90, vx: 420, vy: 0, w: 26, h: 3, dmg: 2, pierce: true, laser: true});
  for (let i = 0; i < 25; i++) update(1/60);
  res.laserSingleHitPerEnemy = v.hp === 3;
  // E: body contact costs a life
  enemies = []; shots = []; player.alive = true; player.respawn = 0; player.invuln = 0; player.shield = 0;
  player.x = 150; player.y = 120; const l1 = lives;
  spawnDrone(120, 0); enemies[0].x = 158; enemies[0].y = 120; enemies[0].up = ()=>{};
  for (let i = 0; i < 8; i++) update(1/60);
  res.contactHitsPlayer = lives === l1 - 1;
  // F/G: firewall absorbs shots in the beam, lets them through the gap
  enemies = []; shots = []; player.alive = false; player.respawn = 99;
  spawnGate(); const gt = enemies[0]; gt.x = 250; gt.y = 135; gt.up = ()=>{};
  spawnDrone(60, 0);  const d1 = enemies[1]; d1.x = 320; d1.y = 60;  d1.up = ()=>{};
  spawnDrone(135, 0); const d2 = enemies[2]; d2.x = 320; d2.y = 135; d2.up = ()=>{};
  shots.push({x: 190, y: 60,  vx: 300, vy: 0, w: 9, h: 3, dmg: 2});
  shots.push({x: 190, y: 135, vx: 300, vy: 0, w: 9, h: 3, dmg: 2});
  for (let i = 0; i < 40; i++) update(1/60);
  res.gateBlocksShots = d1.hp === 2;
  res.gapAllowsShots = d2.hp <= 0;
  // H: firewall fries an enemy flying through it
  enemies = []; shots = [];
  spawnGate(); const gt2 = enemies[0]; gt2.x = 250; gt2.y = 135; gt2.up = ()=>{};
  spawnDrone(60, 0); const d3 = enemies[1]; d3.x = 262; d3.y = 60; d3.up = (e,dt)=>{ e.x -= 60*dt; };
  for (let i = 0; i < 30; i++) update(1/60);
  res.gateFriesEnemies = !enemies.includes(d3);
  // I: capsule meter skips maxed powers; activation levels up
  enemies = []; shots = []; ebullets = []; caps = [];
  player.alive = true; player.invuln = 9; player.meter = 0;
  const wasMuted = muted; muted = true;                 // keep the announcer quiet in tests
  caps.push({x: player.x, y: player.y, t: 0});
  update(1/60);
  activatePower();
  const s1 = player.lv.SPEED === 1 && player.meter === 0;
  player.lv.SPEED = 3;
  caps.push({x: player.x, y: player.y, t: 0});
  update(1/60);
  res.powersLevelAndSkip = s1 && player.meter === 2;    // SPEED maxed -> lands on MISSILE
  // J: force field soaks rapid beam ticks (one charge per cooldown, no life lost)
  player.alive = true; player.invuln = 0; player.shield = 2; player.shieldCd = 0;
  const l3 = lives;
  hitPlayer(); hitPlayer(); hitPlayer();               // burst of beam ticks
  res.shieldBlocksBeams = player.shield === 1 && lives === l3;
  // K: force field deprecates over time
  player.shield = 1; player.shieldT = 5.95;
  enemies = []; ebullets = []; caps = [];
  for (let i = 0; i < 10; i++) update(1/60);
  res.shieldDeprecates = player.shield === 0 && lives === l3;
  // L: lasers collide with bosses instead of passing through
  enemies = []; shots = []; ebullets = []; player.alive = false; player.respawn = 99;
  spawnBoss();
  boss.x = 300; boss.y = 100; boss.entered = true;
  const bhp = boss.maxhp;
  shots.push({x: 210, y: 100, vx: 420, vy: 0, w: 26, h: 3, dmg: 2, pierce: true, laser: true});
  for (let i = 0; i < 25; i++) update(1/60);
  res.laserStopsAtBoss = boss && boss.hp === bhp - 2 && shots.length === 0;
  boss = null;
  muted = wasMuted;
  res.allPass = Object.keys(res).every(k => res[k] === true || k === 'allPass');
  reset(); state = 'title';
  return res;
};

// ---------- main loop ----------
reset(); state = 'title';
let last = 0;
function frame(t){
  const dt = Math.min(.033, (t - last) / 1000 || .016);
  last = t;
  if (state === 'play' && !paused) update(dt);
  else if (state !== 'play') scrollBG(dt, .5);
  if (state === 'intro'){
    introT += dt;
    // fanfare handled by the sequencer ('crawl' song)
    if (level === 1){
      if ((introT - 2.2) * 20 > crawlH + 60) beginPlay();
    } else if (introT > 6.5) beginPlay();
  }
  render();
  window.__dbg = window.__dbg || null;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
